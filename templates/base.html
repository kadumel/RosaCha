{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default:"Rosa Chá" }}</title>
    <meta name="description" content="{{ meta_description|default:'Rosa Chá - catering e experiências elegantes para eventos intimistas.' }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    {% include 'includes/header.html' %}
    <main>
        {% if messages %}
            <section class="flash-wrapper container" aria-live="polite">
                {% for message in messages %}
                    <p class="flash flash-{{ message.tags }}">{{ message }}</p>
                {% endfor %}
            </section>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    {% include 'includes/footer.html' %}
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
